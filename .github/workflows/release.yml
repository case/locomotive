name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve merged PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 5,
            });

            const merged = prs.find(pr => pr.merge_commit_sha === context.sha);
            if (!merged) {
              core.info('No merged PR found for this push, skipping release');
              core.setOutput('skip', 'true');
              return;
            }

            const labels = merged.labels.map(l => l.name);

            if (labels.includes('release/skip')) {
              core.info('release/skip label found, skipping release');
              core.setOutput('skip', 'true');
              return;
            }

            let bump = '';
            if (labels.includes('release/major')) bump = 'major';
            else if (labels.includes('release/minor')) bump = 'minor';
            else if (labels.includes('release/patch')) bump = 'patch';

            if (!bump) {
              core.info('No release label on merged PR, skipping release');
              core.setOutput('skip', 'true');
              return;
            }

            core.setOutput('skip', 'false');
            core.setOutput('bump', bump);
            core.setOutput('pr_number', merged.number.toString());
            core.setOutput('pr_title', merged.title);

      - name: Compute next version
        if: steps.pr.outputs.skip != 'true'
        id: version
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          LATEST=${LATEST:-v0.0.0}
          VERSION=${LATEST#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "${{ steps.pr.outputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${LATEST} → v${MAJOR}.${MINOR}.${PATCH} (${{ steps.pr.outputs.bump }})"

      - name: Push tag
        if: steps.pr.outputs.skip != 'true'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Set up QEMU
        if: steps.pr.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.pr.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log into ghcr.io
        if: steps.pr.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.pr.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        if: steps.pr.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          TAG: ${{ steps.version.outputs.tag }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          PR_TITLE: ${{ steps.pr.outputs.pr_title }}
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG,
              name: process.env.TAG,
              body: `PR #${process.env.PR_NUMBER}: ${process.env.PR_TITLE}`,
              generate_release_notes: true,
            });
